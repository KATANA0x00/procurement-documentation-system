name: Build and Push Docker Image

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Set up QEMU for multi-arch builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build and push Docker image (multi-arch with caching)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: shoyuu/procurement-documentation-system:latest
          cache-from: type=registry,ref=shoyuu/procurement-documentation-system:buildcache
          cache-to: type=registry,ref=shoyuu/procurement-documentation-system:buildcache,mode=max
