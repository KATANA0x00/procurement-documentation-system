name: Auto Version + Docker Build

on:
  push:
    branches:
      - master

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.create_tag.outputs.new_tag }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true  # needed to push tags

      - name: Get next version
        id: get_version
        run: |
          # Get the latest version tag like v1.2.3
          LAST_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          echo "Last tag: $LAST_TAG"
      
          if [ -z "$LAST_TAG" ]; then
            MAJOR=0
            MINOR=2
            PATCH=0
          else
            # Parse version numbers safely
            VERSION="${LAST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<<"$VERSION"
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}
            PATCH=$((PATCH + 1))
          fi
      
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
      
          # Ensure tag doesn’t already exist remotely
          while git ls-remote --tags origin | grep -q "refs/tags/$NEW_TAG"; do
            PATCH=$((PATCH + 1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          done
      
          echo "Using new tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and push new tag
        env:
          TAG: ${{ steps.get_version.outputs.new_tag }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "new_tag=$TAG" >> $GITHUB_OUTPUT

  docker-build:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            shoyuu/procurement-documentation-system:latest
            shoyuu/procurement-documentation-system:${{ github.sha }}
            shoyuu/procurement-documentation-system:${{ needs.version.outputs.new_tag }}
          cache-from: type=registry,ref=shoyuu/procurement-documentation-system:buildcache
          cache-to: type=registry,ref=shoyuu/procurement-documentation-system:buildcache,mode=max
