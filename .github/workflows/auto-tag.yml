name: Auto Tag on Merge to Master

on:
  push:
    branches:
      - master   # triggers after a PR is merged

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Get the latest tag and increment
      - name: Get next version
        id: get_version
        run: |
          # get latest tag
          LAST_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          echo "Last tag: $LAST_TAG"
          
          # if no tag yet, start with v0.1.0
          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            # increment patch version
            IFS='.' read -r MAJOR MINOR PATCH <<<"${LAST_TAG#v}"
            PATCH=$((PATCH + 1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          fi
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      # 3. Create and push the new tag
      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.get_version.outputs.new_tag }}
          git push origin ${{ steps.get_version.outputs.new_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
